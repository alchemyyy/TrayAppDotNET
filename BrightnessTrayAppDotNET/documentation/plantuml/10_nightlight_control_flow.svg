<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="656px" preserveAspectRatio="none" style="width:385px;height:656px;background:#000000;" version="1.1" viewBox="0 0 385 656" width="385px" zoomAndPan="magnify"><defs/><g><rect fill="#151600" height="1" style="stroke:#151600;stroke-width:1;" width="1" x="0" y="0"/><rect fill="#EAE2C9" height="70.4375" style="stroke:#EAE2C9;stroke-width:1;" width="383.8848" x="0" y="0"/><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="265.207" x="10" y="14.5332">Add your own dedication into PlantUML</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="3.8896" x="10" y="32.1426">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="136.9512" x="10" y="49.752">For just $5 per month!</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="62.2549" x="10" y="67.3613">Details on</text><a href="https://plantuml.com/dedication" target="" title="https://plantuml.com/dedication" xlink:actuate="onRequest" xlink:href="https://plantuml.com/dedication" xlink:show="new" xlink:title="https://plantuml.com/dedication" xlink:type="simple"><text fill="#000000" font-family="sans-serif" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="192.9922" x="76.1445" y="67.3613">https://plantuml.com/dedication</text></a><rect fill="#000000" height="583.9844" style="stroke:#000000;stroke-width:1;" width="383.8848" x="0" y="70.4375"/><text fill="#33FF02" font-family="sans-serif" font-size="12" font-style="italic" font-weight="bold" lengthAdjust="spacing" textLength="105.375" x="5" y="87.4375">PlantUML 1.2026.2</text><rect fill="#33FF02" height="22.6094" style="stroke:#33FF02;stroke-width:1;" width="373.8848" x="5" y="98.5313"/><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="332.1309" x="6" y="113.5313">[From 10_nightlight_control_flow.puml (line 216) ]</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="3.8896" x="5" y="135.1406">&#160;</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="227.5342" x="5" y="152.75">@startuml nightlight_control_flow</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="3.8896" x="5" y="170.3594">&#160;</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="3.8896" x="5" y="187.9688">&#160;</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="3.8896" x="5" y="205.5781">&#160;</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="3.8896" x="5" y="223.1875">&#160;</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="11.6689" x="5" y="240.7969">...</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="153.2617" x="5" y="258.4063">... ( skipping 296 lines )</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="11.6689" x="5" y="276.0156">...</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="206.8965" x="12.7793" y="293.625">fire - one-shot per quiet period.</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="3.8896" x="5" y="311.2344">&#160;</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="311.1992" x="12.7793" y="328.8438">Callback wrapped in try/catch (M-11 fix) so any</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="327.4961" x="12.7793" y="346.4531">thrown exception is logged and swallowed rather</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="330.5859" x="12.7793" y="364.0625">than tearing down the process from a thread-pool</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="161.0068" x="12.7793" y="381.6719">context with no handler.</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="3.8896" x="5" y="399.2813">&#160;</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="353.165" x="12.7793" y="416.8906">CancelPendingResend is now public so the zero-trap</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="326.6826" x="12.7793" y="434.5">fix at NightLightProvider.SetStrength(0) can drop</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="313.127" x="12.7793" y="452.1094">a queued resend before flipping enabled=false.</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="3.8896" x="5" y="469.7188">&#160;</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="323.6611" x="12.7793" y="487.3281">History: an earlier impl allocated a fresh CTS per</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="355.5508" x="12.7793" y="504.9375">call and threw OperationCanceledException for every</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="366.1055" x="12.7793" y="522.5469">supersession. At 60+/sec slider rates the kernel-handle</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="349.6924" x="12.7793" y="540.1563">+ exception churn caused UI hitches even though all</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="354.6963" x="12.7793" y="557.7656">the work happened on the thread pool. Timer.Change</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="225.6475" x="12.7793" y="575.375">is thread-safe and effectively free.</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="58.3311" x="5" y="592.9844">end note</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="3.8896" x="5" y="610.5938">&#160;</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" text-decoration="wavy underline" textLength="231.0752" x="5" y="628.2031">note over NLP_RESOLVE #1F2D40</text><text fill="#FF0000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="343.8408" x="8.8896" y="645.8125">Syntax Error? (Assumed diagram type: component)</text><?plantuml-src lLnjKnj9alwkNr7hsBsH1hKGOECPl3XEIB9HM21M4dRCBXD4eowX3bhTlVs2q6xSVxydiwhwJH9cRl4vOWRehihAoihAV38hg__a-ZClTQHmxEZ1IXPoALjXklHgFucnV7HZwOZ3zk6nrNvd7HoT23iCFHVFxDHnazl3e_rlzgEq3gov-oJifVGT_9V4jSHDF2aktVj5OddqVs69MU0dKU29kHUiX9s8AFKJTob5_NeWxcMSf94KraTn5GMFhYCZuRXnQ2Up1JsyY-pPWqpKhy43tkAtXHqvApkIZHgOFNszVw0sjDT1ceWuYUn4tg_nn7gzVw3sLKQ9ExCzSMVxJYoI8