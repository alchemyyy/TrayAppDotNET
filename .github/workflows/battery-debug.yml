name: Battery Debug

on:
  push:
    branches: [main, master]
    paths:
      - BatteryTrayAppDotNET/**
      - TrayAppDotNETCommon/**
      - Directory.Build.props
      - TrayAppDotNET.Parent.props
      - TrayAppDotNET.Parent.targets
      - .github/workflows/battery-debug.yml
      - .github/workflows/_trayapp-debug.yml
  pull_request:
    paths:
      - BatteryTrayAppDotNET/**
      - TrayAppDotNETCommon/**
      - Directory.Build.props
      - TrayAppDotNET.Parent.props
      - TrayAppDotNET.Parent.targets
      - .github/workflows/battery-debug.yml
      - .github/workflows/_trayapp-debug.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  debug:
    uses: ./.github/workflows/_trayapp-debug.yml
    with:
      app_name: BatteryTrayAppDotNET
      project_path: BatteryTrayAppDotNET/src/BatteryTrayAppDotNET.csproj
      artifact_slug: battery-tray-app

