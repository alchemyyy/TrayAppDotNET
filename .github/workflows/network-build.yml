name: Network Build

on:
  push:
    branches: [main, master]
    paths:
      - NetworkTrayAppDotNET/**
      - TrayAppDotNETCommon/**
      - Directory.Build.props
      - TrayAppDotNET.Parent.props
      - TrayAppDotNET.Parent.targets
      - .github/workflows/network-build.yml
      - .github/workflows/_trayapp-build.yml
  pull_request:
    paths:
      - NetworkTrayAppDotNET/**
      - TrayAppDotNETCommon/**
      - Directory.Build.props
      - TrayAppDotNET.Parent.props
      - TrayAppDotNET.Parent.targets
      - .github/workflows/network-build.yml
      - .github/workflows/_trayapp-build.yml
  workflow_dispatch:
  workflow_call:
    inputs:
      package_profile:
        required: false
        type: string
        default: none
      package_artifact_name:
        required: false
        type: string
        default: ""
      tray_version:
        required: false
        type: string
        default: ""
      force_rebuild:
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    uses: ./.github/workflows/_trayapp-build.yml
    with:
      app_name: NetworkTrayAppDotNET
      project_path: NetworkTrayAppDotNET/src/NetworkTrayAppDotNET.csproj
      artifact_slug: network-tray-app
      package_profile: ${{ inputs.package_profile || 'none' }}
      package_artifact_name: ${{ inputs.package_artifact_name || '' }}
      tray_version: ${{ inputs.tray_version || '' }}
      force_rebuild: ${{ inputs.force_rebuild || false }}
