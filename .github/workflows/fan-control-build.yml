name: Fan Control Build

on:
  push:
    branches: [main, master]
    paths:
      - FanControlTrayAppDotNET/**
      - TrayAppDotNETCommon/**
      - Directory.Build.props
      - TrayAppDotNET.Parent.props
      - TrayAppDotNET.Parent.targets
      - .github/workflows/fan-control-build.yml
      - .github/workflows/_trayapp-build.yml
  pull_request:
    paths:
      - FanControlTrayAppDotNET/**
      - TrayAppDotNETCommon/**
      - Directory.Build.props
      - TrayAppDotNET.Parent.props
      - TrayAppDotNET.Parent.targets
      - .github/workflows/fan-control-build.yml
      - .github/workflows/_trayapp-build.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    uses: ./.github/workflows/_trayapp-build.yml
    with:
      app_name: FanControlTrayAppDotNET
      project_path: FanControlTrayAppDotNET/src/FanControlTrayAppDotNET.csproj
      artifact_slug: fan-control-tray-app
