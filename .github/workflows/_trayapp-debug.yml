name: TrayApp Debug Build

on:
  workflow_call:
    inputs:
      app_name:
        required: true
        type: string
      project_path:
        required: true
        type: string
      artifact_slug:
        required: true
        type: string

permissions:
  contents: read

jobs:
  debug:
    name: ${{ inputs.app_name }} Debug
    runs-on: [self-hosted]
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Verify .NET SDK
        shell: bash
        run: |
          set -euo pipefail
          command -v dotnet
          dotnet --info
          dotnet --list-sdks | grep -E '^10\.'

      - name: Restore
        shell: bash
        run: dotnet restore "${{ inputs.project_path }}" -p:EnableWindowsTargeting=true

      - name: Build Debug
        shell: bash
        run: >
          dotnet build "${{ inputs.project_path }}"
          --configuration Debug
          --no-restore
          --output ".artifacts/build/${{ inputs.app_name }}/Debug"
          -p:EnableWindowsTargeting=true
          -p:SkipKillRunningInstance=true
          -p:SkipPublishAfterBuild=true
          -p:ContinuousIntegrationBuild=true

      - name: Upload Debug Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_slug }}-debug-${{ github.sha }}
          path: .artifacts/build/${{ inputs.app_name }}/Debug/**
          if-no-files-found: error
          retention-days: 14
