name: Publish

on:
  workflow_dispatch:
    inputs:
      tray_app_dot_net_version:
        description: Aggregate TrayAppDotNET version. Defaults to latest published release + 1, minimum 100.
        required: false
        type: string
      release_tag:
        description: Release tag. Defaults to TrayAppDotNET_<version>.
        required: false
        type: string
      force_rebuild:
        description: Build every app even if latest release has equal/newer app asset.
        required: true
        default: false
        type: boolean

permissions:
  actions: write
  contents: write

jobs:
  build-release-battery:
    name: Battery Release
    uses: ./.github/workflows/battery-build.yml
    with:
      package_profile: release
      package_artifact_name: battery-tray-app-release-package-${{ github.run_id }}
      tray_version: ${{ inputs.tray_app_dot_net_version }}
      force_rebuild: ${{ inputs.force_rebuild }}

  build-release-brightness:
    name: Brightness Release
    uses: ./.github/workflows/brightness-build.yml
    with:
      package_profile: release
      package_artifact_name: brightness-tray-app-release-package-${{ github.run_id }}
      tray_version: ${{ inputs.tray_app_dot_net_version }}
      force_rebuild: ${{ inputs.force_rebuild }}

  build-release-fan-control:
    name: Fan Control Release
    uses: ./.github/workflows/fan-control-build.yml
    with:
      package_profile: release
      package_artifact_name: fan-control-tray-app-release-package-${{ github.run_id }}
      tray_version: ${{ inputs.tray_app_dot_net_version }}
      force_rebuild: ${{ inputs.force_rebuild }}

  build-release-network:
    name: Network Release
    uses: ./.github/workflows/network-build.yml
    with:
      package_profile: release
      package_artifact_name: network-tray-app-release-package-${{ github.run_id }}
      tray_version: ${{ inputs.tray_app_dot_net_version }}
      force_rebuild: ${{ inputs.force_rebuild }}

  build-release-volume:
    name: Volume Release
    uses: ./.github/workflows/volume-build.yml
    with:
      package_profile: release
      package_artifact_name: volume-tray-app-release-package-${{ github.run_id }}
      tray_version: ${{ inputs.tray_app_dot_net_version }}
      force_rebuild: ${{ inputs.force_rebuild }}

  build-native-aot-battery:
    name: Battery Native AOT
    uses: ./.github/workflows/battery-native-aot.yml
    with:
      package_profile: native-aot
      package_artifact_name: battery-tray-app-native-aot-package-${{ github.run_id }}
      tray_version: ${{ inputs.tray_app_dot_net_version }}
      force_rebuild: ${{ inputs.force_rebuild }}

  build-native-aot-brightness:
    name: Brightness Native AOT
    uses: ./.github/workflows/brightness-native-aot.yml
    with:
      package_profile: native-aot
      package_artifact_name: brightness-tray-app-native-aot-package-${{ github.run_id }}
      tray_version: ${{ inputs.tray_app_dot_net_version }}
      force_rebuild: ${{ inputs.force_rebuild }}

  build-native-aot-fan-control:
    name: Fan Control Native AOT
    uses: ./.github/workflows/fan-control-native-aot.yml
    with:
      package_profile: native-aot
      package_artifact_name: fan-control-tray-app-native-aot-package-${{ github.run_id }}
      tray_version: ${{ inputs.tray_app_dot_net_version }}
      force_rebuild: ${{ inputs.force_rebuild }}

  build-native-aot-network:
    name: Network Native AOT
    uses: ./.github/workflows/network-native-aot.yml
    with:
      package_profile: native-aot
      package_artifact_name: network-tray-app-native-aot-package-${{ github.run_id }}
      tray_version: ${{ inputs.tray_app_dot_net_version }}
      force_rebuild: ${{ inputs.force_rebuild }}

  build-native-aot-volume:
    name: Volume Native AOT
    uses: ./.github/workflows/volume-native-aot.yml
    with:
      package_profile: native-aot
      package_artifact_name: volume-tray-app-native-aot-package-${{ github.run_id }}
      tray_version: ${{ inputs.tray_app_dot_net_version }}
      force_rebuild: ${{ inputs.force_rebuild }}

  publish:
    name: Publish Draft Release
    runs-on: [self-hosted, Linux, X64, trayapp]
    needs:
      - build-release-battery
      - build-release-brightness
      - build-release-fan-control
      - build-release-network
      - build-release-volume
      - build-native-aot-battery
      - build-native-aot-brightness
      - build-native-aot-fan-control
      - build-native-aot-network
      - build-native-aot-volume
    environment: trayapp-release
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Release Package Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-release-package-${{ github.run_id }}"
          path: .artifacts/publish/collected/release
          merge-multiple: true

      - name: Download Native AOT Package Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-native-aot-package-${{ github.run_id }}"
          path: .artifacts/publish/collected/native-aot
          merge-multiple: true

      - name: Verify Release Toolchain
        shell: bash
        run: |
          set -euo pipefail
          command -v gh
          command -v python3 || command -v python

      - name: Publish Draft Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          python_bin="python3"
          if ! command -v python3 >/dev/null 2>&1; then
            python_bin="python"
          fi

          args=(
            .github/scripts/publish.py
            --phase publish-release
            --repo "${GITHUB_REPOSITORY}"
            --input-root .artifacts/publish/collected
          )

          if [[ -n "${{ inputs.tray_app_dot_net_version }}" ]]; then
            args+=(--tray-version "${{ inputs.tray_app_dot_net_version }}")
          fi

          if [[ -n "${{ inputs.release_tag }}" ]]; then
            args+=(--release-tag "${{ inputs.release_tag }}")
          fi

          "$python_bin" "${args[@]}"

      - name: Upload Aggregate Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tray-app-dot-net-conglomerate-builds-${{ github.run_id }}
          path: |
            .artifacts/publish/collected/_release/TrayAppDotNET_*.zip
            !.artifacts/publish/collected/_release/TrayAppDotNET_*_Symbols.zip
          if-no-files-found: error

      - name: Upload Aggregate Symbol Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tray-app-dot-net-conglomerate-symbols-${{ github.run_id }}
          path: .artifacts/publish/collected/_release/TrayAppDotNET_*_Symbols.zip
          if-no-files-found: error

      - name: Remove Intermediate Package Artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          release_suffix="-release-package-${GITHUB_RUN_ID}"
          native_aot_suffix="-native-aot-package-${GITHUB_RUN_ID}"

          gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/artifacts?per_page=100" \
            --jq ".artifacts[] | select(.name | endswith(\"${release_suffix}\") or endswith(\"${native_aot_suffix}\")) | [.id, .name] | @tsv" |
          while IFS=$'\t' read -r artifact_id artifact_name; do
            if [[ -z "${artifact_id}" ]]; then
              continue
            fi

            echo "Deleting intermediate package artifact: ${artifact_name}"
            gh api --method DELETE "repos/${GITHUB_REPOSITORY}/actions/artifacts/${artifact_id}"
          done
