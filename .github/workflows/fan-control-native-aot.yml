name: Fan Control Native AOT

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      package_profile:
        required: false
        type: string
        default: none
      package_artifact_name:
        required: false
        type: string
        default: ""
      tray_version:
        required: false
        type: string
        default: ""
      force_rebuild:
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  native-aot:
    uses: ./.github/workflows/_trayapp-native-aot.yml
    with:
      app_name: FanControlTrayAppDotNET
      project_path: FanControlTrayAppDotNET/src/FanControlTrayAppDotNET.csproj
      artifact_slug: fan-control-tray-app
      package_profile: ${{ inputs.package_profile || 'none' }}
      package_artifact_name: ${{ inputs.package_artifact_name || '' }}
      tray_version: ${{ inputs.tray_version || '' }}
      force_rebuild: ${{ inputs.force_rebuild || false }}
