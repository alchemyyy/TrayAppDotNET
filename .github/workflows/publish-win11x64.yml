name: Publish Win11x64

on:
  workflow_dispatch:
    inputs:
      tray_app_dot_net_version:
        description: Aggregate TrayAppDotNET version. Defaults to max selected app build number.
        required: false
        type: string
      release_tag:
        description: Release tag. Defaults to TrayAppDotNET_<version>_x64Win.
        required: false
        type: string
      force_rebuild:
        description: Build every app even if latest release has equal/newer app asset.
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  publish:
    name: Publish Win11x64
    runs-on: [self-hosted]
    environment: trayapp-release
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Verify Toolchain
        shell: bash
        run: |
          set -euo pipefail
          command -v dotnet
          command -v gh
          command -v python3 || command -v python
          dotnet --info
          dotnet --list-sdks | grep -E '^10\.'

      - name: Publish Draft Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          python_bin="python3"
          if ! command -v python3 >/dev/null 2>&1; then
            python_bin="python"
          fi

          args=(
            .github/scripts/publish-win11x64.py
            --repo "${GITHUB_REPOSITORY}"
          )

          if [[ -n "${{ inputs.tray_app_dot_net_version }}" ]]; then
            args+=(--tray-version "${{ inputs.tray_app_dot_net_version }}")
          fi

          if [[ -n "${{ inputs.release_tag }}" ]]; then
            args+=(--release-tag "${{ inputs.release_tag }}")
          fi

          if [[ "${{ inputs.force_rebuild }}" == "true" ]]; then
            args+=(--force-rebuild)
          fi

          "$python_bin" "${args[@]}"
