name: TrayApp Release Build

on:
  workflow_call:
    inputs:
      app_name:
        required: true
        type: string
      project_path:
        required: true
        type: string
      artifact_slug:
        required: true
        type: string
      runtime:
        required: false
        type: string
        default: win-x64
      version:
        required: false
        type: string
        default: ""
      release_tag:
        required: false
        type: string
        default: ""
      publish_github_release:
        required: false
        type: boolean
        default: false
      draft:
        required: false
        type: boolean
        default: true
      prerelease:
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    name: ${{ inputs.app_name }} Release
    runs-on: [self-hosted, Windows, X64]
    environment: trayapp-release
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Verify .NET SDK
        shell: bash
        run: |
          set -euo pipefail
          command -v dotnet
          dotnet --info
          dotnet --list-sdks | grep -E '^10\.'

      - name: Resolve Release Metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          version="$(printf '%s' "${{ inputs.version }}" | xargs)"
          if [[ -z "$version" ]]; then
            version="0.0.${GITHUB_RUN_NUMBER}"
          fi

          tag="$(printf '%s' "${{ inputs.release_tag }}" | xargs)"
          if [[ -z "$tag" ]]; then
            tag="trayapp-v$version"
          fi

          runtime="$(printf '%s' "${{ inputs.runtime }}" | xargs)"
          artifact_slug="$(printf '%s' "${{ inputs.artifact_slug }}" | xargs)"

          {
            echo "version=$version"
            echo "release_tag=$tag"
            echo "release_title=TrayAppDotNET $version"
            echo "package_name=$artifact_slug-$version-$runtime.zip"
          } >> "$GITHUB_OUTPUT"

      - name: Restore
        shell: bash
        run: dotnet restore "${{ inputs.project_path }}"

      - name: Publish Release
        shell: bash
        run: >
          dotnet publish "${{ inputs.project_path }}"
          --configuration Release
          --runtime "${{ inputs.runtime }}"
          --output ".artifacts/publish/${{ inputs.app_name }}/${{ inputs.runtime }}"
          -p:SkipKillRunningInstance=true
          -p:SkipPublishAfterBuild=true
          -p:ContinuousIntegrationBuild=true

      - name: Package Release
        id: package
        shell: bash
        run: |
          set -euo pipefail

          app_name="${{ inputs.app_name }}"
          runtime="${{ inputs.runtime }}"
          version="${{ steps.meta.outputs.version }}"
          package_name="${{ steps.meta.outputs.package_name }}"

          publish_dir=".artifacts/publish/$app_name/$runtime"
          package_dir=".artifacts/package"
          zip_path="$package_dir/$package_name"
          sha_path="$zip_path.sha256"
          manifest_path="$package_dir/$package_name.manifest.json"

          if [[ ! -d "$publish_dir" ]]; then
            echo "Publish directory not found: $publish_dir" >&2
            exit 1
          fi

          mkdir -p "$package_dir"
          rm -f "$zip_path" "$sha_path" "$manifest_path"
          zip_abs="$(cd "$package_dir" && pwd)/$package_name"
          windows_tar="${WINDIR:-C:\\Windows}"
          windows_tar="${windows_tar//\\//}/System32/tar.exe"

          if [[ -x "$windows_tar" ]]; then
            "$windows_tar" -a -cf "$zip_path" -C "$publish_dir" .
          elif command -v 7z >/dev/null 2>&1; then
            (cd "$publish_dir" && 7z a -tzip "$zip_abs" .)
          else
            echo "Neither Windows tar.exe nor 7z is available for zip packaging." >&2
            exit 1
          fi

          hash="$(sha256sum "$zip_path" | awk '{print tolower($1)}')"
          printf '%s  %s\n' "$hash" "$package_name" > "$sha_path"

          json_escape() {
            printf '%s' "$1" | sed 's/\\/\\\\/g; s/"/\\"/g'
          }

          created_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          cat > "$manifest_path" <<JSON
          {
            "appId": "$(json_escape "$app_name")",
            "version": "$(json_escape "$version")",
            "runtime": "$(json_escape "$runtime")",
            "fileName": "$(json_escape "$package_name")",
            "sha256": "$hash",
            "repository": "$(json_escape "$GITHUB_REPOSITORY")",
            "commit": "$(json_escape "$GITHUB_SHA")",
            "runId": "$(json_escape "$GITHUB_RUN_ID")",
            "releaseTag": "$(json_escape "${{ steps.meta.outputs.release_tag }}")",
            "createdAt": "$created_at"
          }
          JSON

          {
            echo "zip_path=$zip_path"
            echo "sha256_path=$sha_path"
            echo "manifest_path=$manifest_path"
          } >> "$GITHUB_OUTPUT"

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_slug }}-release-${{ steps.meta.outputs.version }}-${{ inputs.runtime }}
          path: |
            ${{ steps.package.outputs.zip_path }}
            ${{ steps.package.outputs.sha256_path }}
            ${{ steps.package.outputs.manifest_path }}
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release Assets
        if: ${{ inputs.publish_github_release }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if ! command -v gh >/dev/null 2>&1; then
            echo "GitHub CLI is not installed on this runner. Install gh or run with publish_github_release=false." >&2
            exit 1
          fi

          tag="${{ steps.meta.outputs.release_tag }}"
          title="${{ steps.meta.outputs.release_title }}"
          notes="Automated release assets for ${{ inputs.app_name }}."

          if ! gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            create_args=(
              release
              create
              "$tag"
              --repo "$GITHUB_REPOSITORY"
              --target "$GITHUB_SHA"
              --title "$title"
              --notes "$notes"
            )

            if [[ "${{ inputs.draft }}" == "true" ]]; then
              create_args+=(--draft)
            fi

            if [[ "${{ inputs.prerelease }}" == "true" ]]; then
              create_args+=(--prerelease)
            fi

            gh "${create_args[@]}"
          fi

          gh release upload "$tag" \
            "${{ steps.package.outputs.zip_path }}" \
            "${{ steps.package.outputs.sha256_path }}" \
            "${{ steps.package.outputs.manifest_path }}" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
