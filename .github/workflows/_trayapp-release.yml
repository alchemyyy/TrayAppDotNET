name: TrayApp Release Build

on:
  workflow_call:
    inputs:
      app_name:
        required: true
        type: string
      project_path:
        required: true
        type: string
      artifact_slug:
        required: true
        type: string
      dotnet_version:
        required: false
        type: string
        default: 10.0.x
      runtime:
        required: false
        type: string
        default: win-x64
      version:
        required: false
        type: string
        default: ""
      release_tag:
        required: false
        type: string
        default: ""
      publish_github_release:
        required: false
        type: boolean
        default: false
      draft:
        required: false
        type: boolean
        default: true
      prerelease:
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    name: ${{ inputs.app_name }} Release
    runs-on: [self-hosted, Windows, X64]
    environment: trayapp-release
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet_version }}

      - name: Show .NET info
        shell: pwsh
        run: dotnet --info

      - name: Resolve Release Metadata
        id: meta
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}".Trim()
          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = "0.0.$env:GITHUB_RUN_NUMBER"
          }

          $tag = "${{ inputs.release_tag }}".Trim()
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $tag = "trayapp-v$version"
          }

          $runtime = "${{ inputs.runtime }}".Trim()
          $appName = "${{ inputs.app_name }}".Trim()
          $artifactSlug = "${{ inputs.artifact_slug }}".Trim()

          "version=$version" >> $env:GITHUB_OUTPUT
          "release_tag=$tag" >> $env:GITHUB_OUTPUT
          "release_title=TrayAppDotNET $version" >> $env:GITHUB_OUTPUT
          "package_name=$artifactSlug-$version-$runtime.zip" >> $env:GITHUB_OUTPUT

      - name: Restore
        shell: pwsh
        run: dotnet restore "${{ inputs.project_path }}"

      - name: Publish Release
        shell: pwsh
        run: >
          dotnet publish "${{ inputs.project_path }}"
          --configuration Release
          --runtime "${{ inputs.runtime }}"
          --output ".artifacts/publish/${{ inputs.app_name }}/${{ inputs.runtime }}"
          -p:SkipKillRunningInstance=true
          -p:SkipPublishAfterBuild=true
          -p:ContinuousIntegrationBuild=true

      - name: Package Release
        id: package
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $appName = "${{ inputs.app_name }}"
          $runtime = "${{ inputs.runtime }}"
          $version = "${{ steps.meta.outputs.version }}"
          $packageName = "${{ steps.meta.outputs.package_name }}"

          $publishDir = Join-Path $env:GITHUB_WORKSPACE ".artifacts\publish\$appName\$runtime"
          $packageDir = Join-Path $env:GITHUB_WORKSPACE ".artifacts\package"
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null

          $zipPath = Join-Path $packageDir $packageName
          $shaPath = "$zipPath.sha256"
          $manifestPath = Join-Path $packageDir "$packageName.manifest.json"

          if (Test-Path $zipPath) {
            Remove-Item -LiteralPath $zipPath -Force
          }

          Compress-Archive -Path (Join-Path $publishDir "*") -DestinationPath $zipPath -Force

          $hash = (Get-FileHash -LiteralPath $zipPath -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $packageName" | Set-Content -LiteralPath $shaPath -Encoding UTF8

          $manifest = [ordered]@{
            appId = $appName
            version = $version
            runtime = $runtime
            fileName = $packageName
            sha256 = $hash
            repository = $env:GITHUB_REPOSITORY
            commit = $env:GITHUB_SHA
            runId = $env:GITHUB_RUN_ID
            releaseTag = "${{ steps.meta.outputs.release_tag }}"
            createdAt = (Get-Date).ToUniversalTime().ToString("o")
          }

          $manifest | ConvertTo-Json -Depth 5 | Set-Content -LiteralPath $manifestPath -Encoding UTF8

          "zip_path=$zipPath" >> $env:GITHUB_OUTPUT
          "sha256_path=$shaPath" >> $env:GITHUB_OUTPUT
          "manifest_path=$manifestPath" >> $env:GITHUB_OUTPUT

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_slug }}-release-${{ steps.meta.outputs.version }}-${{ inputs.runtime }}
          path: |
            ${{ steps.package.outputs.zip_path }}
            ${{ steps.package.outputs.sha256_path }}
            ${{ steps.package.outputs.manifest_path }}
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release Assets
        if: ${{ inputs.publish_github_release }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"

          if (-not (Get-Command gh -ErrorAction SilentlyContinue)) {
            throw "GitHub CLI is not installed on this runner. Install gh or run with publish_github_release=false."
          }

          $tag = "${{ steps.meta.outputs.release_tag }}"
          $title = "${{ steps.meta.outputs.release_title }}"
          $notes = "Automated release assets for ${{ inputs.app_name }}."

          gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -ne 0) {
            $createArgs = @(
              "release",
              "create",
              $tag,
              "--repo",
              $env:GITHUB_REPOSITORY,
              "--target",
              $env:GITHUB_SHA,
              "--title",
              $title,
              "--notes",
              $notes
            )

            if ("${{ inputs.draft }}" -eq "true") {
              $createArgs += "--draft"
            }

            if ("${{ inputs.prerelease }}" -eq "true") {
              $createArgs += "--prerelease"
            }

            gh @createArgs
          }

          $uploadArgs = @(
            "release",
            "upload",
            $tag,
            "${{ steps.package.outputs.zip_path }}",
            "${{ steps.package.outputs.sha256_path }}",
            "${{ steps.package.outputs.manifest_path }}",
            "--repo",
            $env:GITHUB_REPOSITORY,
            "--clobber"
          )

          gh @uploadArgs

