name: TrayApp Release Build

on:
  workflow_call:
    inputs:
      app_name:
        required: true
        type: string
      project_path:
        required: true
        type: string
      artifact_slug:
        required: true
        type: string
      runtime:
        required: false
        type: string
        default: portable
      version:
        required: false
        type: string
        default: ""
      release_tag:
        required: false
        type: string
        default: ""
      publish_github_release:
        required: false
        type: boolean
        default: false
      draft:
        required: false
        type: boolean
        default: true
      prerelease:
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    name: ${{ inputs.app_name }} Release
    runs-on: [self-hosted]
    environment: trayapp-release
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Verify .NET SDK
        shell: bash
        run: |
          set -euo pipefail
          command -v dotnet
          dotnet --info
          dotnet --list-sdks | grep -E '^10\.'

      - name: Resolve Release Metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          version="$(printf '%s' "${{ inputs.version }}" | xargs)"
          if [[ -z "$version" ]]; then
            version="0.0.${GITHUB_RUN_NUMBER}"
          fi

          tag="$(printf '%s' "${{ inputs.release_tag }}" | xargs)"
          if [[ -z "$tag" ]]; then
            tag="trayapp-v$version"
          fi

          runtime="$(printf '%s' "${{ inputs.runtime }}" | xargs)"
          if [[ -z "$runtime" ]]; then
            runtime="portable"
          fi

          runtime_output="$runtime"
          runtime_arg="$runtime"
          if [[ "$runtime" == "portable" ]]; then
            runtime_arg=""
          fi

          artifact_slug="$(printf '%s' "${{ inputs.artifact_slug }}" | xargs)"

          {
            echo "version=$version"
            echo "release_tag=$tag"
            echo "release_title=TrayAppDotNET $version"
            echo "runtime_output=$runtime_output"
            echo "runtime_arg=$runtime_arg"
            echo "package_name=$artifact_slug-$version-$runtime_output.zip"
          } >> "$GITHUB_OUTPUT"

      - name: Restore
        shell: bash
        run: dotnet restore "${{ inputs.project_path }}" -p:EnableWindowsTargeting=true

      - name: Publish Release
        shell: bash
        run: |
          set -euo pipefail

          publish_args=(
            dotnet
            publish
            "${{ inputs.project_path }}"
            --configuration
            Release
            --output
            ".artifacts/publish/${{ inputs.app_name }}/${{ steps.meta.outputs.runtime_output }}"
            -p:EnableWindowsTargeting=true
            -p:SkipKillRunningInstance=true
            -p:SkipPublishAfterBuild=true
            -p:ContinuousIntegrationBuild=true
          )

          if [[ -n "${{ steps.meta.outputs.runtime_arg }}" ]]; then
            publish_args+=(--runtime "${{ steps.meta.outputs.runtime_arg }}")
          fi

          "${publish_args[@]}"

      - name: Package Release
        id: package
        shell: bash
        run: |
          set -euo pipefail

          app_name="${{ inputs.app_name }}"
          runtime="${{ steps.meta.outputs.runtime_output }}"
          version="${{ steps.meta.outputs.version }}"
          package_name="${{ steps.meta.outputs.package_name }}"

          publish_dir=".artifacts/publish/$app_name/$runtime"
          package_dir=".artifacts/package"
          zip_path="$package_dir/$package_name"
          sha_path="$zip_path.sha256"
          manifest_path="$package_dir/$package_name.manifest.json"

          if [[ ! -d "$publish_dir" ]]; then
            echo "Publish directory not found: $publish_dir" >&2
            exit 1
          fi

          python_bin=""
          if command -v python3 >/dev/null 2>&1; then
            python_bin="python3"
          elif command -v python >/dev/null 2>&1; then
            python_bin="python"
          else
            echo "Python 3 is required for release packaging." >&2
            exit 1
          fi

          mkdir -p "$package_dir"
          rm -f "$zip_path" "$sha_path" "$manifest_path"

          APP_NAME="$app_name" \
          RUNTIME="$runtime" \
          VERSION="$version" \
          PACKAGE_NAME="$package_name" \
          PUBLISH_DIR="$publish_dir" \
          ZIP_PATH="$zip_path" \
          SHA_PATH="$sha_path" \
          MANIFEST_PATH="$manifest_path" \
          RELEASE_TAG="${{ steps.meta.outputs.release_tag }}" \
          "$python_bin" - <<'PY'
          import datetime
          import hashlib
          import json
          import os
          from pathlib import Path
          from zipfile import ZIP_DEFLATED, ZipFile

          publish_dir = Path(os.environ["PUBLISH_DIR"])
          zip_path = Path(os.environ["ZIP_PATH"])
          sha_path = Path(os.environ["SHA_PATH"])
          manifest_path = Path(os.environ["MANIFEST_PATH"])
          package_name = os.environ["PACKAGE_NAME"]

          with ZipFile(zip_path, "w", ZIP_DEFLATED) as archive:
              for path in sorted(publish_dir.rglob("*")):
                  if path.is_file():
                      archive.write(path, path.relative_to(publish_dir).as_posix())

          digest = hashlib.sha256()
          with zip_path.open("rb") as package:
              for chunk in iter(lambda: package.read(1024 * 1024), b""):
                  digest.update(chunk)
          sha256 = digest.hexdigest()

          sha_path.write_text(f"{sha256}  {package_name}\n", encoding="utf-8")

          manifest = {
              "appId": os.environ["APP_NAME"],
              "version": os.environ["VERSION"],
              "runtime": os.environ["RUNTIME"],
              "fileName": package_name,
              "sha256": sha256,
              "repository": os.environ["GITHUB_REPOSITORY"],
              "commit": os.environ["GITHUB_SHA"],
              "runId": os.environ["GITHUB_RUN_ID"],
              "releaseTag": os.environ["RELEASE_TAG"],
              "createdAt": datetime.datetime.now(datetime.timezone.utc).isoformat().replace("+00:00", "Z"),
          }
          manifest_path.write_text(json.dumps(manifest, indent=2) + "\n", encoding="utf-8")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"zip_path={zip_path.as_posix()}\n")
              output.write(f"sha256_path={sha_path.as_posix()}\n")
              output.write(f"manifest_path={manifest_path.as_posix()}\n")
          PY

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_slug }}-release-${{ steps.meta.outputs.version }}-${{ inputs.runtime }}
          path: |
            ${{ steps.package.outputs.zip_path }}
            ${{ steps.package.outputs.sha256_path }}
            ${{ steps.package.outputs.manifest_path }}
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release Assets
        if: ${{ inputs.publish_github_release }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if ! command -v gh >/dev/null 2>&1; then
            echo "GitHub CLI is not installed on this runner. Install gh or run with publish_github_release=false." >&2
            exit 1
          fi

          tag="${{ steps.meta.outputs.release_tag }}"
          title="${{ steps.meta.outputs.release_title }}"
          notes="Automated release assets for ${{ inputs.app_name }}."

          if ! gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            create_args=(
              release
              create
              "$tag"
              --repo "$GITHUB_REPOSITORY"
              --target "$GITHUB_SHA"
              --title "$title"
              --notes "$notes"
            )

            if [[ "${{ inputs.draft }}" == "true" ]]; then
              create_args+=(--draft)
            fi

            if [[ "${{ inputs.prerelease }}" == "true" ]]; then
              create_args+=(--prerelease)
            fi

            gh "${create_args[@]}"
          fi

          gh release upload "$tag" \
            "${{ steps.package.outputs.zip_path }}" \
            "${{ steps.package.outputs.sha256_path }}" \
            "${{ steps.package.outputs.manifest_path }}" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
